name: Cập nhật dữ liệu và triển khai GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Không hủy lượt quét dữ liệu đang chạy giữa chừng.
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
      - name: Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Khôi phục bộ nhớ đệm dữ liệu
        uses: actions/cache@v4
        with:
          path: data
          key: tender-data-${{ github.run_id }}
          restore-keys: |
            tender-data-
      - name: Kiểm tra bộ trích thông số e-HSMT
        run: node --test scripts/technical-requirements.test.mjs

      # Khi chỉ sửa giao diện/mã nguồn và push lên main, dùng ngay dữ liệu gần nhất
      # từ cache để triển khai nhanh. Việc quét nguồn công khai tiếp tục chạy theo
      # lịch 15 phút hoặc khi bấm Run workflow thủ công.
      - name: Lấy dữ liệu công khai mới nhất
        if: github.event_name != 'push'
        run: node scripts/fetch-data.mjs
      - name: Quét bù nhanh gói mới theo địa danh
        if: github.event_name != 'push'
        run: node scripts/fetch-recent-location-fallback.mjs

      - name: Áp dụng dữ liệu thiết bị đã xác minh
        run: node scripts/apply-manual-equipment-overrides.mjs
      - name: Tạo bản tĩnh
        run: node scripts/build-pages.mjs
      - name: Cấu hình Pages
        uses: actions/configure-pages@v5
      - name: Tải bản tĩnh lên Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages
      - name: Triển khai
        id: deployment
        uses: actions/deploy-pages@v4
